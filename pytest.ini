# ============================================================
# TRATHEA — pytest.ini
# ============================================================
[pytest]
DJANGO_SETTINGS_MODULE = trathea_orchestrator.settings.dev
python_files = tests.py test_*.py *_tests.py
python_classes = Test* *Tests
python_functions = test_*
addopts = -v --tb=short --cov=. --cov-report=html --cov-omit=*/migrations/*,*/tests/*

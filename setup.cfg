[flake8]
max-line-length = 100
exclude =
    .git,
    __pycache__,
    migrations,
    .venv,
    venv,
    build,
    dist
ignore = E203, W503, E501
per-file-ignores =
    */settings/*.py: F401, F403, E501
    */migrations/*.py: E501

[isort]
profile = black
line_length = 100
skip = migrations, .venv, venv

[coverage:run]
source = .
omit =
    */migrations/*
    */tests/*
    manage.py
    */settings/*
    .venv/*
    venv/*
